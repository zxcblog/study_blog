syntax = "proto3";

package base.v1;

option go_package = "zxcblog/study_blog/proto/base;base";

message PageReq {
  int64 limit = 1;
  int64 offset = 2;
}

message PageRes {
  int64 total = 1;
  int64 current_page = 2;
  int64 total_page = 3;
  int64 page_size = 4;
}

message Response {
  string code = 1;
  string msg = 2;
}
